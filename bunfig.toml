# bunfig.toml

# scripts to run before `bun run`-ing a file or script
# register plugins by adding them to this list
# Preload disabled - SvelteKit native instrumentation now handles this via src/instrumentation.server.ts
# preload = ['./src/instrumentation.ts']
logLevel = "debug"

[run]
# equivalent to `bun --bun` for all `bun run` commands
bun = true
